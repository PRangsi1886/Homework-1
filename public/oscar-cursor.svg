<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 96" width="32" height="64">
  <defs>
    <linearGradient id="goldBody" x1="18%" y1="0%" x2="82%" y2="100%">
      <stop offset="0%" stop-color="#fff4c4"/>
      <stop offset="22%" stop-color="#e8c84a"/>
      <stop offset="55%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#7a5a12"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8891a"/>
      <stop offset="100%" stop-color="#5c4308"/>
    </linearGradient>
    <linearGradient id="goldReel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#4a3608"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="headGlow" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fff8dc"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </radialGradient>
  </defs>

  <ellipse cx="24" cy="92" rx="16" ry="3.2" fill="#000" opacity="0.28"/>

  <!-- Film reel base -->
  <ellipse cx="24" cy="86.5" rx="15" ry="5.2" fill="url(#goldReel)" stroke="#3d2e06" stroke-width="0.5"/>
  <ellipse cx="24" cy="85.8" rx="11.5" ry="3.8" fill="none" stroke="#f0d060" stroke-width="0.55" opacity="0.45"/>
  <circle cx="24" cy="86" r="3.2" fill="#3d2e06"/>
  <circle cx="24" cy="86" r="1.1" fill="#f0d060" opacity="0.7"/>
  <circle cx="17.5" cy="86" r="1.35" fill="#2a1f05"/>
  <circle cx="30.5" cy="86" r="1.35" fill="#2a1f05"/>
  <circle cx="20" cy="89.2" r="1.15" fill="#2a1f05"/>
  <circle cx="28" cy="89.2" r="1.15" fill="#2a1f05"/>
  <circle cx="24" cy="82.8" r="1.15" fill="#2a1f05"/>

  <!-- Pedestal -->
  <path d="M17 72.5 L31 72.5 L33.5 84.5 L14.5 84.5 Z" fill="url(#goldDark)" stroke="#3d2e06" stroke-width="0.45"/>
  <path d="M19.5 72.5 L28.5 72.5 L27.5 68.5 L20.5 68.5 Z" fill="url(#goldBody)" stroke="#6b4f0a" stroke-width="0.35"/>
  <rect x="20" y="66.8" width="8" height="1.8" rx="0.4" fill="#f0d060" opacity="0.35"/>

  <!-- Knight figure -->
  <g fill="url(#goldBody)" stroke="#6b4f0a" stroke-width="0.45" stroke-linejoin="round">
    <!-- Legs -->
    <path d="M20.2 68.2 C20.2 63 21.5 58.5 22.8 55.2 L22.2 68.2 Z"/>
    <path d="M27.8 68.2 C27.8 63 26.5 58.5 25.2 55.2 L25.8 68.2 Z"/>
    <!-- Robe / lower body -->
    <path d="M18.8 55.5 C18.2 58.8 17.8 62.5 18 66.2 L30 66.2 C30.2 62.5 29.8 58.8 29.2 55.5 C27.8 52.8 26.2 51.2 24 51.2 C21.8 51.2 20.2 52.8 18.8 55.5 Z"/>
    <!-- Torso -->
    <path d="M17.5 51.5 C17.2 47.5 18 42.8 19.8 39.5 L28.2 39.5 C30 42.8 30.8 47.5 30.5 51.5 C29.2 54.2 26.8 55.8 24 55.8 C21.2 55.8 18.8 54.2 17.5 51.5 Z"/>
    <!-- Shoulders -->
    <path d="M15.8 40.2 C16.5 37.8 19 35.8 24 35.5 C29 35.8 31.5 37.8 32.2 40.2 L31.2 42.5 L16.8 42.5 Z"/>
    <!-- Arms holding sword -->
    <path d="M16.8 42.2 C15.2 40.5 14.8 38.2 15.5 36.2 C16.2 34.5 17.8 33.5 19.2 34.2 L20.5 38.5 L18.8 42.8 Z"/>
    <path d="M31.2 42.2 C32.8 40.5 33.2 38.2 32.5 36.2 C31.8 34.5 30.2 33.5 28.8 34.2 L27.5 38.5 L29.2 42.8 Z"/>
    <!-- Head -->
    <ellipse cx="24" cy="29.5" rx="4.6" ry="5.4"/>
    <!-- Neck -->
    <rect x="22.3" y="34.2" width="3.4" height="2.2" rx="0.8"/>
  </g>

  <!-- Sword -->
  <g fill="url(#goldBody)" stroke="#6b4f0a" stroke-width="0.35">
    <rect x="23.35" y="4" width="1.3" height="31" rx="0.25"/>
    <rect x="21.2" y="33.8" width="5.6" height="1.5" rx="0.35"/>
    <circle cx="24" cy="36.8" r="1.15" fill="#f0d060"/>
    <path d="M23.2 4 L24 1.8 L24.8 4 Z" fill="#fff8dc"/>
  </g>

  <!-- Metallic highlights -->
  <path d="M21 30 C21.5 24 22.5 18 24 14 C22 18 21.2 24 21.5 31 Z" fill="url(#sheen)" opacity="0.75"/>
  <ellipse cx="22.2" cy="27.8" rx="1.1" ry="1.6" fill="#fff" opacity="0.35"/>
  <path d="M19.5 48 L20.2 58 L21 48 Z" fill="#fff" opacity="0.12"/>
</svg>
